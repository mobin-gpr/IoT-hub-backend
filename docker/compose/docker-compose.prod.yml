services:

  web:

    build:

      context: ../..

      dockerfile: docker/Dockerfile.prod

    ports:

      - "8000:8000"

    command: python -m gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --graceful-timeout 30

    env_file:
      - .env.prod

    environment:

      - DJANGO_ENV=production

      - DB_HOST=db

      - DB_PORT=5432

      - REDIS_URL=redis://redis:6379/0

      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//

    depends_on:

      - db

      - redis

      - rabbitmq

      - influxdb

    restart: unless-stopped



  celery_worker:

    build:

      context: ../..

      dockerfile: docker/Dockerfile.prod

    command: celery -A core worker --loglevel=info

    env_file:
      - .env.prod

    environment:

      - DJANGO_ENV=production

      - DB_HOST=db

      - DB_PORT=5432

      - REDIS_URL=redis://redis:6379/0

      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//

    depends_on:

      - db

      - redis

      - rabbitmq

      - influxdb

    restart: unless-stopped



  celery_beat:

    build:

      context: ../..

      dockerfile: docker/Dockerfile.prod

    command: celery -A core beat --loglevel=info

    env_file:
      - .env.prod

    environment:

      - DJANGO_ENV=production

      - DB_HOST=db

      - DB_PORT=5432

      - REDIS_URL=redis://redis:6379/0

      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//

    depends_on:

      - db

      - redis

      - rabbitmq

      - influxdb

    restart: unless-stopped



  db:

    image: postgres:15

    env_file:
      - .env.prod

    environment:

      - POSTGRES_DB=${DB_NAME}

      - POSTGRES_USER=${DB_USER}

      - POSTGRES_PASSWORD=${DB_PASSWORD}

    volumes:

      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    ports:

      - "5432:5432"



  redis:

    image: redis:7-alpine

    restart: unless-stopped

    ports:

      - "6379:6379"



  rabbitmq:

    image: rabbitmq:3-management

    env_file:
      - .env.prod

    environment:

      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}

      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}

    restart: unless-stopped

    ports:

      - "5672:5672"

      - "15672:15672"



  influxdb:

    image: influxdb:2.7

    env_file:
      - .env.prod

    environment:

      - INFLUXDB_DB=${INFLUXDB_DB}

      - INFLUXDB_USER=${INFLUXDB_USER}

      - INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD}

    volumes:

      - influxdb_data:/var/lib/influxdb2

    restart: unless-stopped

    ports:

      - "8086:8086"



volumes:

  postgres_data:

  influxdb_data: