version: '3.8'

services:
  web:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ../../.:/app
    environment:
      - DJANGO_ENV=development
      - DB_NAME=iotdb
      - DB_USER=iotuser
      - DB_PASSWORD=iotpass
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://iotuser:iotpass@rabbitmq:5672//
    depends_on:
      - db
      - redis
      - rabbitmq
      - influxdb

  celery_worker:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.dev
    command: celery -A core worker --loglevel=info
    volumes:
      - ../../.:/app
    environment:
      - DJANGO_ENV=development
      - DB_NAME=iotdb
      - DB_USER=iotuser
      - DB_PASSWORD=iotpass
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://iotuser:iotpass@rabbitmq:5672//
    depends_on:
      - db
      - redis
      - rabbitmq
      - influxdb

  celery_beat:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.dev
    command: celery -A core beat --loglevel=info
    volumes:
      - ../../.:/app
    environment:
      - DJANGO_ENV=development
      - DB_NAME=iotdb
      - DB_USER=iotuser
      - DB_PASSWORD=iotpass
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://iotuser:iotpass@rabbitmq:5672//
    depends_on:
      - db
      - redis
      - rabbitmq
      - influxdb

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=iotdb
      - POSTGRES_USER=iotuser
      - POSTGRES_PASSWORD=iotpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=iotuser
      - RABBITMQ_DEFAULT_PASS=iotpass
    ports:
      - "5673:5672"
      - "15673:15672"

  influxdb:
    image: influxdb:2.7
    environment:
      - INFLUXDB_DB=iotdb
      - INFLUXDB_USER=iotuser
      - INFLUXDB_PASSWORD=iotpass
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2

volumes:
  postgres_data:
  influxdb_data: